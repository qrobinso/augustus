version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: augustus-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/augustus.db
      - AUDIO_STORAGE_PATH=/app/audio
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      - TTS_PROVIDER=${TTS_PROVIDER:-piper}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - API_KEY=${API_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./data:/app/data
      - ./audio:/app/audio
      - ./models:/app/models
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: augustus-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
  audio:
  models:

networks:
  default:
    name: augustus-network

